function q18(){

    ];

function q19(){
    let nomes=["Ana","Carlos","Pedro"];
    let busca=prompt("Digite nome");
    let encontrado=false;

    for(let nome of nomes){
        if(nome===busca){
            encontrado=true;
        }
    }

    console.log(encontrado?"Encontrado":"Não encontrado");
}

let alunosSistema=[];

function q20(){
    let opcao;

    do{
        opcao=Number(prompt("1-Cadastrar 2-Listar 3-Média 4-Sair"));

        switch(opcao){
            case 1:
                alunosSistema.push({
                    nome: prompt("Nome"),
                    nota: Number(prompt("Nota"))
                });
                break;

            case 2:
                console.table(alunosSistema);
                break;

            case 3:
                let soma=0;
                for(let aluno of alunosSistema){
                    soma+=aluno.nota;
                }
                console.log(soma/alunosSistema.length);
                break;
        }

    }while(opcao!==4);
}
